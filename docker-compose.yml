
services:
  postgres:
    image: postgres:15
    container_name: smart-postgres
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    container_name: smart-mongo
    env_file: .env
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    container_name: smart-rabbitmq
    env_file: .env
    ports:
      - "5672:5672"
      - "15672:15672"

